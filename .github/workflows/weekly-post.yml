name: Weekly LinkedIn Post

on:
  schedule:
    # Every Monday at 10:00 AEST (UTC+10) → 00:00 UTC Monday
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_MEMBER_URN: ${{ secrets.LINKEDIN_MEMBER_URN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC: ${{ vars.TOPIC || 'Azure Landing Zone with ZTA Architecture' }}
          POST_TONE: ${{ vars.POST_TONE }}
          MAX_POST_WORDS: ${{ vars.MAX_POST_WORDS }}
        run: npm run -s run

      - name: Commit post history
        if: success()
        run: |
          if [[ -n "$(git status --porcelain data/post-history.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/post-history.json
            git commit -m "chore: append weekly post to history"
            git push
          else
            echo "No history changes to commit."
          fi
